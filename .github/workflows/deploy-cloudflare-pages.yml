name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - prod
  workflow_dispatch:
    inputs:
      reason:
        description: Why this manual production deployment is being run
        required: false
        default: Manual deployment

permissions:
  contents: read

concurrency:
  group: cloudflare-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production branch
    runs-on: ubuntu-latest
    steps:
      - name: Enforce prod promotion source
        if: ${{ github.event_name == 'push' }}
        run: |
          message="${{ github.event.head_commit.message }}"
          if ! printf '%s' "$message" | grep -q "Promote main to prod"; then
            echo "prod deployments must come from the approved main-to-prod promotion PR." >&2
            exit 1
          fi

      - name: Log deployment context
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"
          echo "Reason: ${{ inputs.reason }}"

      - name: Checkout production ref
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages production
        run: npm run wrangler -- pages deploy dist --project-name portfolio --branch prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
